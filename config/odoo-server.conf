[options]
; ---------------------------------------------------------------------------
; WujiaTea — Odoo 19 SERVER config (Windows server, paths theo D:\wujia-tea)
; ---------------------------------------------------------------------------

; Addons paths — Windows style
addons_path = D:\wujia-tea\odoo19\addons,D:\wujia-tea\themes,D:\wujia-tea\themes\oca_queue,D:\wujia-tea\custom

; Filestore + sessions
data_dir = D:\wujia-tea\data

; Database
db_host = 127.0.0.1
db_port = 5432
db_user = odoo19
db_password = 1
db_name = wujia_tea_19
dbfilter = ^wujia_tea_19$
list_db = True

; HTTP
http_enable = True
http_interface = 0.0.0.0
http_port = 8019
gevent_port = 8020

; Workers — server prod thì để 2-4, dev thì 0
workers = 0
max_cron_threads = 1

; Logging
logfile = D:\wujia-tea\logs\odoo.log
log_level = info
log_handler = :INFO,werkzeug:WARNING

; Master password
admin_passwd = wujia_admin

; Misc
proxy_mode = False
without_demo = False
server_wide_modules = base,web,queue_job

; Queue job config
[queue_job]
channels = root:1
scheme = http
host = localhost
port = 8019
http_auth_user = admin
http_auth_password = admin
