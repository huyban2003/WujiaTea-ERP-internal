[options]
; ---------------------------------------------------------------------------
; WujiaTea — Odoo 19 development config (self-contained inside WujiaTea/)
; ---------------------------------------------------------------------------

; Addons: core Odoo 19 + 3rd-party themes + OCA queue + our custom WujiaTea modules
addons_path = /home/huyban/odoo-dev/WujiaTea/odoo19/addons,/home/huyban/odoo-dev/WujiaTea/themes,/home/huyban/odoo-dev/WujiaTea/themes/oca_queue,/home/huyban/odoo-dev/WujiaTea/custom

; Filestore + sessions (kept inside the project so it's easy to back up / wipe)
data_dir = /home/huyban/odoo-dev/WujiaTea/data

; Database — dedicated odoo19 role to avoid touching projects on odoo16
db_host = 127.0.0.1
db_port = 5432
db_user = odoo19
db_password = 1
db_name = wujia_tea_19
dbfilter = ^wujia_tea_19$
list_db = True

; HTTP — non-default ports so it doesn't clash with other Odoo instances
http_enable = True
http_interface = 0.0.0.0
http_port = 8019
gevent_port = 8020

; Workers: 0 = single-threaded (good for dev with --dev=all hot reload)
workers = 0
max_cron_threads = 1

; Logging
logfile = /home/huyban/odoo-dev/WujiaTea/logs/odoo.log
log_level = info
log_handler = :INFO,werkzeug:WARNING

; Master password (for /web/database manager). Change for staging/prod.
admin_passwd = wujia_admin

; Misc
proxy_mode = False
without_demo = False
server_wide_modules = base,web
