services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: odoo19
      POSTGRES_PASSWORD: "1"
      POSTGRES_DB: wujia_tea_19
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - wujia-net

  odoo:
    image: python:3.12-slim
    restart: unless-stopped
    depends_on:
      - db
    working_dir: /opt/odoo
    command: >
      bash -c "pip install -r odoo19/requirements.txt -q &&
               python odoo19/odoo-bin -c config/odoo.conf"
    volumes:
      - .:/opt/odoo
    ports:
      - "8019:8019"
      - "8020:8020"
    networks:
      - wujia-net
    environment:
      - PYTHONUNBUFFERED=1

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - odoo
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    networks:
      - wujia-net

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt

volumes:
  pgdata:
  certbot-www:
  certbot-certs:

networks:
  wujia-net:
