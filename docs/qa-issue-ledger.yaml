# WujiaTea — QA Issue Ledger
# ---------------------------------------------------------------------------
# Nguồn sự thật "issue nào Dev đã LÀM XONG + DEPLOY" để tool qa_sync.py điền
# đúng Dev-handoff (QA Operating Standard §6) khi set issue -> "Ready for Retest".
#
# Chỉ thêm entry khi code của mình THỰC SỰ khớp "Kết quả mong muốn" HIỆN TẠI của
# issue trên sheet. Nếu BA đã đổi expected mà code chưa theo -> ĐỪNG thêm (issue
# còn mở). qa_sync vẫn tự SKIP issue có Need BA Confirm = Yes / Need Clarification.
#
# Format mỗi entry (key = Issue ID trong tab "5. Issue List"):
#   sprint:        số/nhãn sprint đã fix
#   commit:        short SHA đã deploy (điền cột P Build/Deploy)
#   deployed_date: YYYY-MM-DD (ngày build có mặt trên UAT)
#   url:           route đại diện để retest
#   odoo_fit:      Odoo Standard | Configuration | Custom | Need Dev Confirm | N/A  (cột R)
#   fix:           1 câu — đã thay đổi gì            (ghép vào cột K: FIX)
#   impact:        màn hình/luồng liên quan          (cột K: IMPACT)
#   retest:        điểm cần kiểm khi retest          (cột K: RETEST)
#   limit:         giới hạn còn lại hoặc "Không có"  (cột K: LIMIT)
#
# Cột K cuối cùng qa_sync ghi = "FIX: <fix> | IMPACT: <impact> | RETEST: <retest> | LIMIT: <limit>"
# ---------------------------------------------------------------------------

